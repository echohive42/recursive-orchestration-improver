<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
<title id="title">Recursive Orchestration Improver progress</title>
<desc id="desc">Panel-winner and direct-baseline accuracy across 19 fresh sealed rounds. A separate note reports the strongest replicated system.</desc>
<defs>
