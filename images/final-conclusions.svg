<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">Final conclusions from the Recursive Orchestration Improver</title><desc id="desc">A concluded research summary showing a strong repair effect, no improvement of the fixed swarm over time, and model-dependent value from deeper orchestration.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07101f"/><stop offset="1" stop-color="#10132a"/></linearGradient></defs><rect width="1600" height="1000" rx="34" fill="url(#bg)"/><text x="70" y="72" fill="#5ee7c5" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700" letter-spacing="4">RECURSIVE ORCHESTRATION IMPROVER · FINAL RECORD</text><text x="70" y="132" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="45" font-weight="750">Orchestration worked. Recursive improvement did not.</text><text x="70" y="172" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="21">30 development rounds · 396 sealed cases · 7,535 Luna Light calls · one fixed transfer screen</text><rect x="55" y="220" width="760" height="430" rx="26" fill="#111b31" stroke="#2b3c5b"/><text x="90" y="270" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="27" font-weight="700">A real orchestration effect</text><text x="90" y="304" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="17">Exact accuracy on the same 354 Luna Light cases</text><text x="90" y="360" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="19">Direct</text><rect x="90" y="378" width="500" height="24" rx="12" fill="#2a3851"/><rect x="90" y="378" width="93.2" height="24" rx="12" fill="#9babc4"/><text x="610" y="399" fill="#9babc4" font-family="ui-monospace,monospace" font-size="22" font-weight="700">9.3%</text><text x="90" y="452" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="19">Five-agent plurality</text><rect x="90" y="470" width="500" height="24" rx="12" fill="#2a3851"/><rect x="90" y="470" width="124.3" height="24" rx="12" fill="#9b87ff"/><text x="610" y="491" fill="#9b87ff" font-family="ui-monospace,monospace" font-size="22" font-weight="700">12.4%</text><text x="90" y="544" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="19">Five agents + three repairers</text><rect x="90" y="562" width="500" height="24" rx="12" fill="#2a3851"/><rect x="90" y="562" width="412.4" height="24" rx="12" fill="#5ee7c5"/><text x="610" y="583" fill="#5ee7c5" font-family="ui-monospace,monospace" font-size="22" font-weight="700">41.2%</text><text x="90" y="622" fill="#5ee7c5" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700">+28.8 points over plurality</text><text x="390" y="622" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="17">107 helpful · 5 harmful reversals</text><rect x="845" y="220" width="700" height="430" rx="26" fill="#111b31" stroke="#2b3c5b"/><text x="880" y="270" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="27" font-weight="700">The fixed swarm plateaued</text><text x="880" y="304" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="17">Same five-agent + three-repair mechanism over time</text><polyline points="950,357.6 1175,380.9 1400,372.7" fill="none" stroke="#ffc36b" stroke-width="4"/><line x1="950" y1="340" x2="950" y2="565" stroke="#2a3851"/><circle cx="950" cy="357.6" r="11" fill="#ffc36b" stroke="#f6f9ff" stroke-width="2"/><text x="950" y="335.6" text-anchor="middle" fill="#ffc36b" font-family="ui-monospace,monospace" font-size="22" font-weight="700">44.1%</text><text x="950" y="596" text-anchor="middle" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="16">Rounds 1-10</text><text x="950" y="620" text-anchor="middle" fill="#9babc4" font-family="ui-monospace,monospace" font-size="13">45/102</text><line x1="1175" y1="340" x2="1175" y2="565" stroke="#2a3851"/><circle cx="1175" cy="380.9" r="11" fill="#ffc36b" stroke="#f6f9ff" stroke-width="2"/><text x="1175" y="358.9" text-anchor="middle" fill="#ffc36b" font-family="ui-monospace,monospace" font-size="22" font-weight="700">39.2%</text><text x="1175" y="596" text-anchor="middle" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="16">Rounds 11-20</text><text x="1175" y="620" text-anchor="middle" fill="#9babc4" font-family="ui-monospace,monospace" font-size="13">47/120</text><line x1="1400" y1="340" x2="1400" y2="565" stroke="#2a3851"/><circle cx="1400" cy="372.7" r="11" fill="#ffc36b" stroke="#f6f9ff" stroke-width="2"/><text x="1400" y="350.7" text-anchor="middle" fill="#ffc36b" font-family="ui-monospace,monospace" font-size="22" font-weight="700">40.9%</text><text x="1400" y="596" text-anchor="middle" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="16">Rounds 21-30</text><text x="1400" y="620" text-anchor="middle" fill="#9babc4" font-family="ui-monospace,monospace" font-size="13">54/132</text><rect x="55" y="680" width="1490" height="245" rx="26" fill="#0d2030" stroke="#286775"/><text x="90" y="730" fill="#48d7ef" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700">Depth must be calibrated to the model</text><text x="90" y="760" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="16">Best observed organization on the 12-case transfer screen</text><text x="90" y="812" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700">Luna Light</text><text x="90" y="850" fill="#48d7ef" font-family="ui-monospace,monospace" font-size="28" font-weight="700">41.7%</text><text x="195" y="850" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="16">one repairer</text><text x="495" y="812" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700">Terra Low</text><text x="495" y="850" fill="#ffc36b" font-family="ui-monospace,monospace" font-size="28" font-weight="700">91.7%</text><text x="600" y="850" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="16">one repairer was enough</text><text x="900" y="812" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="19" font-weight="700">Luna Medium</text><text x="900" y="850" fill="#9b87ff" font-family="ui-monospace,monospace" font-size="28" font-weight="700">91.7%</text><text x="1005" y="850" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="16">cross-examination</text><line x1="1290" y1="790" x2="1290" y2="875" stroke="#2b3c5b"/><text x="1325" y="810" fill="#5ee7c5" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700">PRACTICAL RULE</text><text x="1325" y="842" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="16">Start with five answers.</text><text x="1325" y="868" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="16">Add one repairer.</text><text x="1325" y="894" fill="#f6f9ff" font-family="Inter,system-ui,sans-serif" font-size="16">Escalate only after calibration.</text><text x="70" y="965" fill="#9babc4" font-family="Inter,system-ui,sans-serif" font-size="15">Development evidence only. The transfer result is 11/12 with wide uncertainty and does not establish unrelated-domain generality.</text></svg>