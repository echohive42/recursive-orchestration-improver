xt x="64" y="191" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">Direct one-call baseline</text><text x="418" y="191" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=396 · 1 calls</text><line x1="519.1" y1="186" x2="585.5" y2="186" stroke="#9ca9c7" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="547.8" cy="186" r="9" fill="#9ca9c7" stroke="#f7fbff" stroke-width="2"/><text x="563.8" y="191" fill="#9ca9c7" font-family="ui-monospace,monospace" font-size="14" font-weight="700">9.3%</text><text x="64" y="253" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">5-solver plurality</text><text x="418" y="253" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=396 · 5 calls</text><line x1="546.9" y1="248" x2="621.2" y2="248" stroke="#7d8cae" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="579.9" cy="248" r="9" fill="#7d8cae" stroke="#f7fbff" stroke-width="2"/><text x="595.9" y="253" fill="#7d8cae" font-family="ui-monospace,monospace" font-size="14" font-weight="700">12.1%</text><text x="64" y="315" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">5-bank + 1 parallel repair</text><text x="418" y="315" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=216 · 6 calls</text><line x1="766.0" y1="310" x2="910.9" y2="310" stroke="#6fd6ff" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="835.3" cy="310" r="9" fill="#6fd6ff" stroke="#f7fbff" stroke-width="2"/><text x="851.3" y="315" fill="#6fd6ff" font-family="ui-monospace,monospace" font-size="14" font-weight="700">34.3%</text><text x="64" y="377" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">5-bank + 3 parallel repair</text><text x="418" y="377" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=354 · 8 calls</text><line x1="858.1" y1="372" x2="975.8" y2="372" stroke="#63f2bd" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="915.9" cy="372" r="9" fill="#63f2bd" stroke="#f7fbff" stroke-width="2"/><text x="931.9" y="377" fill="#63f2bd" font-family="ui-monospace,monospace" font-size="14" font-weight="700">41.2%</text><text x="64" y="439" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">9-bank + 1 parallel repair</text><text x="418" y="439" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=108 · 10 calls</text><line x1="818.6" y1="434" x2="1029.5" y2="434" stroke="#ffc95c" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="920.8" cy="434" r="9" fill="#ffc95c" stroke="#f7fbff" stroke-width="2"/><text x="936.8" y="439" fill="#ffc95c" font-family="ui-monospace,monospace" font-size="14" font-weight="700">41.7%</text><text x="64" y="501" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">9-bank + 1 choose-only selector</text><text x="418" y="501" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=84 · 10 calls</text><line x1="768.2" y1="496" x2="1002.9" y2="496" stroke="#ff8bd4" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="879.6" cy="496" r="9" fill="#ff8bd4" stroke="#f7fbff" stroke-width="2"/><text x="895.6" y="501" fill="#ff8bd4" font-family="ui-monospace,monospace" font-size="14" font-weight="700">38.1%</text><text x="64" y="563" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">5-bank + 3-step cross-examination</text><text x="418" y="563" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=102 · 8 calls</text><line x1="748.2" y1="558" x2="958.6" y2="558" stroke="#bb9cff" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="847.2" cy="558" r="9" fill="#bb9cff" stroke="#f7fbff" stroke-width="2"/><text x="863.2" y="563" fill="#bb9cff" font-family="ui-monospace,monospace" font-size="14" font-weight="700">35.3%</text><text x="64" y="625" fill="#e9eefc" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="600">5-bank + 3 regenerators + integrator</text><text x="418" y="625" text-anchor="end" fill="#7f8eaa" font-family="ui-monospace,monospace" font-size="12">n=168 · 9 calls</text><line x1="779.5" y1="620" x2="945.5" y2="620" stroke="#ff927a" stroke-width="8" stroke-linecap="round" opacity="0.42"/><circle cx="859.0" cy="620" r="9" fill="#ff927a" stroke="#f7fbff" stroke-width="2"/><text x="875.0" y="625" fill="#ff927a" font-family="ui-monospace,monospace" font-size="14" font-weight="700">36.3%</text><line x1="64" y1="678" x2="1256" y2="678" stroke="#263554"/><text x="64" y="716" fill="#63f2bd" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700">Robust result</text><text x="190" y="716" fill="#cbd4e8" font-family="Inter,system-ui,sans-serif" font-size="16">The retained 5 + 3 repair swarm reaches 41.2%, versus 9.3% direct and 12.1% plurality.</text><text x="64" y="748" fill="#ffc95c" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700">Search result</text><text x="190" y="748" fill="#cbd4e8" font-family="Inter,system-ui,sans-serif" font-size="16">No later mechanism has yet produced a matched, statistically persuasive improvement over the incumbent.</text><text x="64" y="780" fill="#ff8bd4" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700">Main bottleneck</text><text x="190" y="780" fill="#cbd4e8" font-family="Inter,system-ui,sans-serif" font-size="16">Candidate banks often contain the truth, but weak integration leaves correct minority answers unused.</text></svg>